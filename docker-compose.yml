services:
  postgres:
    image: postgres:16-alpine
    container_name: qazquiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qazquiz
      POSTGRES_PASSWORD: qazquiz
      POSTGRES_DB: qazquiz
    ports:
      - "5432:5432"
    volumes:
      - qazquiz-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qazquiz -d qazquiz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qazquiz-pgdata:
