services:
  postgres:
    image: postgres:16-alpine
    container_name: qazquiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qazquiz
      POSTGRES_PASSWORD: qazquiz
      POSTGRES_DB: qazquiz
    ports:
      - "5432:5432"
    volumes:
      - qazquiz-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qazquiz -d qazquiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Kotlin questions API (Spring Boot). Optional locally — you can also run
  # it with `./gradlew bootRun` from apps/api during development.
  api:
    build: ./apps/api
    container_name: qazquiz-api
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qazquiz
      DB_USER: qazquiz
      DB_PASSWORD: qazquiz
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  qazquiz-pgdata:
